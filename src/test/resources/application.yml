spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: root
    password: secret
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    properties.hibernate.format_sql: true
    defer-datasource-initialization: true
    initialization-mode: always
    generate-ddl: true
    show-sql: true
